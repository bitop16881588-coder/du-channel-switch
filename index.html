<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四方『内外部』通道开关 NEW</title>
<style>
  :root{
    --nav:#15233b; --nav2:#1d3050; --gold:#c79a3a; --gold-soft:#e8d199;
    --ink:#1c2128; --ink2:#3a424d; --muted:#6b7682; --line:#e3e7ec;
    --bg:#eef1f5; --card:#ffffff;
    --g:#1f9d57; --g-bg:#e7f6ec; --amber:#c9871a; --amber-bg:#fdf3e0;
    --red:#cf3b3b; --red-bg:#fbe9e9; --blue:#2f6f8f; --blue-bg:#e6f1f6;
    --purple:#7a51c4; --purple-bg:#efe9fb; --gray:#8a939e; --gray-bg:#eef1f4;
    --orange:#d9772e; --orange-bg:#fbeede;
    --shadow:0 1px 2px rgba(20,30,40,.06),0 2px 8px rgba(20,30,40,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:"PingFang TC","PingFang SC","Microsoft JhengHei","Noto Sans TC",system-ui,-apple-system,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;padding-bottom:48px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:0 16px}

  .lock-bg{position:fixed;inset:0;z-index:200;background:linear-gradient(160deg,#15233b,#1d3050);display:flex;align-items:center;justify-content:center;padding:20px}
  .lock-bg.hidden{display:none}
  .lock-card{background:#fff;border-radius:18px;padding:30px 26px;width:100%;max-width:320px;text-align:center;box-shadow:0 14px 44px rgba(0,0,0,.45)}
  .lock-ic{font-size:34px}
  .lock-title{font-size:18px;font-weight:800;margin-top:8px;color:var(--ink);letter-spacing:.5px}
  .lock-sub{font-size:13px;color:var(--muted);margin:5px 0 16px}
  .lock-card input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;font-size:16px;outline:none;text-align:center;font-family:inherit}
  .lock-card input:focus{border-color:var(--gold)}
  .lock-err{color:var(--red);font-size:12.5px;font-weight:700;min-height:18px;margin:9px 0}
  .lock-btn{width:100%;border:none;background:var(--nav);color:#fff;padding:12px;border-radius:11px;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:2px}
  .lock-btn:hover{background:#1d3050}

  header.top{background:linear-gradient(160deg,var(--nav) 0%,var(--nav2) 100%);
    border-radius:0 0 16px 16px;padding:15px 18px 13px;color:#fff;
    box-shadow:0 6px 22px rgba(21,35,59,.25);position:relative;overflow:hidden}
  header.top::after{content:"";position:absolute;right:-40px;top:-40px;width:140px;height:140px;
    background:radial-gradient(circle,rgba(199,154,58,.22),transparent 70%);pointer-events:none}
  .title{font-size:18px;font-weight:800;letter-spacing:.8px;display:flex;align-items:center;gap:9px;color:#fff}
  .title .tag{font-size:10px;font-weight:800;color:var(--nav);background:var(--gold);padding:2px 7px;border-radius:6px;letter-spacing:1.2px}
  .sub{color:#aebbd0;font-size:11.5px;margin-top:4px;display:flex;gap:12px;flex-wrap:wrap}
  .sub b{color:var(--gold-soft);font-weight:700}
  .hd-row{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  .hd-left{min-width:0}
  .stats{display:flex;gap:6px;flex-shrink:0;align-items:center}
  .stat{display:flex;align-items:baseline;gap:4px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-left:3px solid rgba(255,255,255,.3);border-radius:8px;padding:4px 9px}
  .stat .n{font-size:15px;font-weight:800;line-height:1;color:#fff}
  .stat .l{font-size:10.5px;color:#9fb0c8}
  .stat.s-use{border-left-color:#5fe39b} .stat.s-use .n{color:#5fe39b}
  .stat.s-unused{border-left-color:#aab8c8} .stat.s-unused .n{color:#c4d0de}
  .stat.on{border-left-color:#5fe39b} .stat.on .n{color:#5fe39b}
  .stat.off{border-left-color:#ff8a8a} .stat.off .n{color:#ff8a8a}

  .bar{position:sticky;top:0;z-index:20;background:rgba(238,241,245,.93);backdrop-filter:blur(8px);
    padding:12px 0 10px;margin-bottom:4px;border-bottom:1px solid var(--line)}
  .search{position:relative}
  .search input{width:100%;padding:11px 38px 11px 38px;border:1.5px solid var(--line);border-radius:11px;font-size:15px;background:#fff;color:var(--ink);outline:none;transition:border .15s}
  .search input:focus{border-color:var(--gold)}
  .list-search{max-width:170px;margin:0 0 4px}
  .sec-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:13px}
  .sec-head .section-title{margin-bottom:0}
  .sec-head .list-search{margin:0}
  #searchHome:empty{display:none}
  .list-search input{padding:6px 30px;font-size:14px;border-radius:9px}
  .list-search .ic{font-size:14px;left:10px}
  .list-search .clr{right:4px;font-size:16px}
  .search .ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px}
  .search .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 8px;display:none}

  .toolrow{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-top:9px}
  .viewseg{display:inline-flex;background:#e7ebf1;border-radius:13px;padding:3px;gap:4px;flex-shrink:0;margin:0 auto}
  .viewrow{display:flex;align-items:center;gap:12px;flex-wrap:nowrap;margin-top:10px;overflow-x:auto}
  .vr-right{display:flex;align-items:center;gap:11px;flex-wrap:nowrap;flex-shrink:0}
  .vr-right>*{flex-shrink:0;white-space:nowrap}
  .addbtn{border:1.5px solid #2e8b76;background:#2e8b76;color:#fff;padding:6px 14px;border-radius:999px;font-size:13px;font-weight:800;cursor:pointer;transition:.12s;letter-spacing:.5px}
  .addbtn:hover{filter:brightness(1.06);box-shadow:0 2px 8px rgba(46,139,118,.35)}
  .del-merchant{width:100%;margin-top:11px;border:1.5px solid #f0c4c4;background:#fbe9e9;color:var(--red);padding:8px;border-radius:9px;font-size:13px;font-weight:800;cursor:pointer;transition:.12s}
  .del-merchant:hover{background:#f7dada}
  .del-merchant.armed{background:var(--red);color:#fff;border-color:var(--red)}
  .modal-bg{position:fixed;inset:0;background:rgba(17,24,33,.5);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:80;padding:18px}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:380px;max-height:90vh;overflow:auto;box-shadow:0 12px 40px rgba(0,0,0,.3)}
  .mtitle{font-size:17px;font-weight:800;margin-bottom:14px;color:var(--ink)}
  .modal label{display:block;font-size:12.5px;font-weight:700;color:var(--ink2);margin-bottom:11px}
  .modal label .req{color:var(--red)}
  .modal input,.modal select,.modal textarea{width:100%;margin-top:5px;padding:10px 11px;border:1.5px solid var(--line);border-radius:9px;font-size:14px;font-family:inherit;color:var(--ink);background:#fff;outline:none}
  .modal textarea{resize:vertical;min-height:42px;line-height:1.45}
  .modal input:focus,.modal select:focus,.modal textarea:focus{border-color:#2e8b76}
  .merr{color:var(--red);font-size:12.5px;font-weight:700;min-height:18px;margin-bottom:4px}
  .mbtns{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}
  .btn.primary{background:#2e8b76;color:#fff;border-color:#2e8b76}
  .vbtn{display:inline-flex;align-items:center;gap:9px;border:none;background:transparent;padding:6px 60px;border-radius:11px;font-size:16px;font-weight:800;color:var(--ink2);cursor:pointer;transition:.12s;letter-spacing:2px}
  .vbtn::before{content:"";width:11px;height:11px;border-radius:50%;background:currentColor}
  .vbtn.v-in{color:#2f7faf} .vbtn.v-out{color:#cf7a2c}
  .vbtn.active{color:#fff;box-shadow:0 2px 7px rgba(21,35,59,.22)}
  .vbtn.active.v-in{background:#2f7faf} .vbtn.active.v-out{background:#cf7a2c}
  .vbtn.active::before{background:#fff}
  .filters{display:flex;gap:7px;flex-wrap:wrap}
  .filt-wrap{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
  .filters.collapsed{display:none}
  .filt-toggle{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--line);background:#fff;color:var(--ink2);padding:6px 13px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;user-select:none}
  .filt-toggle .fchev{display:inline-block;transition:transform .15s;font-size:10px}
  .filt-toggle.open .fchev{transform:rotate(90deg)}
  .chip{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--line);background:#fff;color:var(--ink2);padding:6px 13px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;transition:.12s;user-select:none}
  .chip::before{content:"";width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.9;flex:none}
  .chip:hover{filter:brightness(.97);box-shadow:0 0 0 2px rgba(199,154,58,.25)}
  .chip.c-neutral{color:var(--ink2)} .chip.c-neutral::before{display:none}
  .chip.c-green{color:var(--g);border-color:#bfe6cd;background:var(--g-bg)}
  .chip.c-gray{color:var(--gray);border-color:#d4dae0;background:var(--gray-bg)}
  .chip.c-red{color:var(--red);border-color:#f0c4c4;background:var(--red-bg)}
  .chip.c-blue{color:var(--blue);border-color:#bcd9e6;background:var(--blue-bg)}
  .chip.c-amber{color:var(--amber);border-color:#f0dcb4;background:var(--amber-bg)}
  .chip.active{color:#fff}
  .chip.active::before{background:#fff}
  .chip.c-neutral.active{background:var(--nav);border-color:var(--nav)}
  .chip.c-green.active{background:var(--g);border-color:var(--g)}
  .chip.c-gray.active{background:var(--gray);border-color:var(--gray)}
  .chip.c-red.active{background:var(--red);border-color:var(--red)}
  .chip.c-blue.active{background:var(--blue);border-color:var(--blue)}
  .chip.c-amber.active{background:var(--amber);border-color:var(--amber)}
  .actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
  .btn{border:1.5px solid var(--line);background:#fff;color:var(--ink2);padding:6px 12px;border-radius:9px;font-size:12.5px;font-weight:700;cursor:pointer;transition:.12s}
  .btn:hover{border-color:var(--gold)}
  .btn.armed{background:var(--red);color:#fff;border-color:var(--red)}

  /* toggle switch */
  .sw{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;font-weight:700;color:var(--ink2);user-select:none}
  .sw .track{width:38px;height:21px;border-radius:999px;background:#cbd2da;position:relative;transition:.18s;flex:none}
  .sw .knob{position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:.18s}
  .sw.on .track{background:var(--g)}
  .sw.on .knob{transform:translateX(17px)}
  .sw.sw-recv:not(.on) .track{background:var(--red)}
  .toolrow .sw,.viewrow .sw{background:#fff;border:1.5px solid var(--line);border-radius:9px;padding:7px 13px;flex-shrink:0}
  .sync{display:inline-flex;align-items:center;gap:7px;cursor:pointer;background:#fff;border:1.5px solid var(--line);border-radius:9px;padding:5px 11px;font-size:12.5px;font-weight:700;color:var(--ink2);user-select:none;transition:.12s}
  .sync:hover{box-shadow:0 0 0 2px rgba(199,154,58,.25)}
  .sync .sdot{width:8px;height:8px;border-radius:50%;background:var(--gray);flex:none}
  .sync.off{opacity:.85}
  .sync.idle{color:var(--g);border-color:#bfe6cd} .sync.idle .sdot{background:var(--g)}
  .sync.busy .sdot{background:var(--amber);animation:syncpulse 1s infinite}
  .sync.err{color:var(--red);border-color:#f0c4c4} .sync.err .sdot{background:var(--red)}
  @keyframes syncpulse{0%,100%{opacity:1}50%{opacity:.25}}

  .legend{background:var(--card);border:1px solid var(--line);border-radius:12px;margin:10px 0 4px;box-shadow:var(--shadow)}
  .legend.collapsed{display:none}
  .legend-grid{display:flex;flex-wrap:wrap;gap:7px;padding:11px 14px}
  .legend-grid .li{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink2)}

  .badge{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;padding:2px 8px;border-radius:7px;white-space:nowrap;line-height:1.6}
  .b-ok{background:#16a64f;color:#fff;font-weight:800;box-shadow:0 0 7px rgba(22,166,79,.5),0 0 0 1px rgba(22,166,79,.35)} .b-amber{background:var(--amber-bg);color:var(--amber)}
  .b-red{background:var(--red-bg);color:var(--red)} .b-blue{background:var(--blue-bg);color:var(--blue)}
  .b-purple{background:var(--purple-bg);color:var(--purple)} .b-gray{background:var(--gray-bg);color:var(--gray)}
  .b-orange{background:var(--orange-bg);color:var(--orange)}
  .badge.big{font-size:13.5px;padding:4px 14px;margin-top:2px}

  .section{border-radius:16px;padding:14px 14px 16px;margin-top:20px}
  .section.sec-use{background:#edf8f1;box-shadow:inset 0 0 0 1px #d2ecdd}
  .section.sec-unused{background:#eceff3;box-shadow:inset 0 0 0 1px #dde3ea}
  .section-title{display:inline-flex;align-items:center;gap:8px;font-size:13.5px;font-weight:800;
    padding:6px 15px;border-radius:999px;margin:0 0 13px;color:#fff;letter-spacing:.5px}
  .section-title.t-use{background:var(--g)}
  .section-title.t-unused{background:var(--gray)}
  .section-title .cnt{font-size:12px;font-weight:600;opacity:.9}
  .subsep{grid-column:1/-1;margin:6px 2px 4px;font-size:12px;font-weight:800;color:var(--muted);display:flex;align-items:center;gap:10px;letter-spacing:.5px}
  .subsep::before,.subsep::after{content:"";height:1px;background:var(--line);flex:1}
  .section-title .tick{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;background:rgba(255,255,255,.25);font-size:11px;font-weight:900;line-height:1}

  .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
  .card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 15px 13px 18px;box-shadow:var(--shadow);overflow:visible;transition:.12s}
  .card:hover{box-shadow:0 4px 14px rgba(20,30,40,.10)}
  .card .accent{position:absolute;left:0;top:0;bottom:0;width:5px;border-radius:13px 0 0 13px}
  .card.dim{opacity:.66}
  .card.dim .accent{filter:saturate(.25)}
  .c-head{display:flex;align-items:center;gap:8px}
  .c-name{flex:1;min-width:0;display:flex;align-items:center;justify-content:center;gap:4px;font-size:18px;font-weight:900;letter-spacing:.2px;padding:6px 11px;border-radius:9px;line-height:1.3}
  .c-name-txt{cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .c-row2{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:8px}
  .c-r2-right{display:flex;align-items:center;gap:9px;flex:none}
  .solo-tag{font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px;line-height:1.4}
  .solo-tag.solo-in{background:#e3effa;color:#2f7faf;border:1px solid #c4dcf0}
  .solo-tag.solo-out{background:#fbeede;color:#cf7a2c;border:1px solid #f0d6b4}
  .c-recv{flex:none}
  .drag-handle{flex:none;cursor:grab;color:var(--muted);font-size:19px;line-height:1;padding:4px 8px;user-select:none;letter-spacing:-2px;touch-action:none;-webkit-user-select:none}
  .drag-handle:active{cursor:grabbing;color:var(--gold)}
  .card.draggable{position:relative}
  .card.dragging{opacity:.45;outline:2px dashed var(--gold);outline-offset:-2px}
  .recv-on{color:var(--g);font-weight:800;font-size:13px;white-space:nowrap}
  .recv-off{color:var(--red);font-weight:800;font-size:13px;white-space:nowrap}

  /* view badges */
  .rowio{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .ie-line{display:flex;align-items:center;gap:8px}
  .ie-line .ie{flex:1;min-width:0}
  .ie-line .rowio{margin-top:0;flex-wrap:nowrap;flex-shrink:0}
  .ie-line .io{font-size:10.5px;padding:2px 7px;gap:3px}
  .io{display:flex;align-items:center;gap:5px;background:#f7f9fb;border:1px solid var(--line);border-radius:8px;padding:3px 9px;font-size:12px;font-weight:600}
  .io .k{color:var(--muted)} .io .v.on{color:var(--g)} .io .v.off{color:var(--gray)}

  /* edit controls: 内部/外部 分开 */
  .ctrl{margin-top:11px;border-top:1px dashed var(--line);padding-top:11px;display:flex;flex-direction:column;gap:8px}
  .ie{display:flex;gap:8px}
  .ie .col{flex:none;display:inline-flex;align-items:center;justify-content:flex-start;gap:8px;min-width:108px;background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:3px 12px}
  .ie .cl{font-size:12px;color:var(--muted);font-weight:800;letter-spacing:.5px;flex:none;margin:0}
  .ie .cl.cl-in{color:#1d566e} .ie .cl.cl-out{color:#b35e1c} .ie .cl.cl-both{color:#7a4ec2}
  .ie .col .sel{flex:1;width:auto}
  .ie .col .badge{margin-top:0}
  .sel{width:100%;appearance:none;-webkit-appearance:none;border:1.5px solid var(--line);border-radius:8px;
    padding:6px 26px 6px 10px;font-size:13px;font-weight:800;background:#fff;color:var(--ink);cursor:pointer;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M1 1l4 4 4-4' fill='none' stroke='%236b7682' stroke-width='1.6'/></svg>");background-repeat:no-repeat;background-position:right 8px center}
  .sel.sel-ok{color:var(--g);border-color:#bfe6cd;background-color:var(--g-bg)}
  .sel.sel-amber{color:var(--amber);border-color:#f0dcb4;background-color:var(--amber-bg)}
  .sel.sel-red{color:var(--red);border-color:#f0c4c4;background-color:var(--red-bg)}
  .sel.sel-blue{color:var(--blue);border-color:#bcd9e6;background-color:var(--blue-bg)}
  .sel.sel-purple{color:var(--purple);border-color:#d6c5f0;background-color:var(--purple-bg)}
  .sel.sel-orange{color:var(--orange);border-color:#f0d2b4;background-color:var(--orange-bg)}
  .sel.sel-gray{color:var(--gray);border-color:#d4dae0;background-color:var(--gray-bg)}
  .sw-row{display:flex;gap:14px;flex-wrap:wrap;padding-top:2px}

  .meta{display:flex;gap:14px;flex-wrap:wrap;margin-top:9px;font-size:12.5px;color:var(--ink2)}
  .meta .m .k{color:var(--muted);font-size:11px;display:block} .meta .m .v{font-weight:700}
  .meta .m .v.on{color:var(--g)} .meta .m .v.off{color:var(--gray)}
  .meta-fold{flex:none}
  .meta-sum{list-style:none;cursor:pointer;font-size:14px;font-weight:900;color:var(--muted);padding:1px 8px;border:1px solid var(--line);border-radius:7px;background:#f1f4f8;line-height:1.2;user-select:none}
  .meta-sum::-webkit-details-marker{display:none}
  .meta-fold[open] .meta-sum{background:#e3e9f1;color:var(--ink2)}
  .meta-pop{display:none}
  .meta-fold[open] .meta-pop{display:block;position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:20;background:var(--card);border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 24px rgba(20,30,40,.20);padding:10px 12px}
  .meta-pop .meta{margin-top:0}
  .note{margin-top:10px;background:#fafbfc;border:1px dashed var(--line);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--ink2);line-height:1.45}
  .note-fold{flex:none}
  .note-sum{list-style:none;cursor:pointer;color:inherit;opacity:.55;font-size:12px;line-height:1;user-select:none;padding:2px 3px}
  .note-sum::-webkit-details-marker{display:none}
  .note-sum::after{content:"▾"}
  .note-fold[open] .note-sum{opacity:.9}
  .note-fold[open] .note-sum::after{content:"▴"}
  .note-pop{display:none}
  .note-fold[open] .note-pop{display:block;position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:20;background:var(--card);border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 24px rgba(20,30,40,.20);padding:9px}
  .note-pop .note{margin-top:0}
  .note-pop .note+.note{margin-top:8px}
  .note .nk{color:var(--gold);font-weight:800;margin-right:5px}

  .note-edit::placeholder{color:#aab2bb}
  .note.n2 .nk{color:var(--blue)}
  .note-wrap{margin-top:10px}
  .note-wrap .ncl{font-size:11px;color:var(--muted);font-weight:700;display:block;margin-bottom:4px;letter-spacing:.5px}
  .note-wrap .note-edit{margin-top:0}
  .srctip{margin-top:5px;font-size:11px;color:var(--muted);background:#f1f4f7;border-left:3px solid var(--line);border-radius:6px;padding:5px 9px;line-height:1.4}
  .chg{margin-top:8px;font-size:11px;color:var(--gold);font-weight:700;display:flex;align-items:center;gap:5px}

  .empty{text-align:center;color:var(--muted);padding:50px 0;font-size:14px}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--nav);color:#fff;padding:9px 18px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:60}

  footer{margin-top:30px;color:var(--muted);font-size:11.5px;text-align:center;line-height:1.7}
  @media (max-width:520px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.title{font-size:16px}header.top{border-radius:0 0 14px 14px}}
  @media (max-width:360px){.grid{grid-template-columns:1fr}}
</style>

      </div>
    </div>

let DATA=[];
let KMAP={};
function prepData(){
  DATA.forEach((d,i)=>d.id=i);
  const seen={};DATA.forEach(d=>{const b=d.商户;seen[b]=(seen[b]||0)+1;d.key=seen[b]>1?b+'#'+seen[b]:b;});
  KMAP={}; DATA.forEach(d=>KMAP[d.key]=d);
  const cb={};let ci=0;DATA.forEach(d=>{const k=d.color||'';if(k&&!isGrayish(k)&&!(k in cb)){cb[k]=NAMEPAL[ci%NAMEPAL.length];ci++;}});colorByGroup=cb;
}

const STATES=[
  {v:'',         t:'正常',     sel:'sel-ok',    badge:'b-ok',     btxt:'正常'},
  {v:'日切',      t:'日切',     sel:'sel-amber', badge:'b-amber',  btxt:'日切'},
  {v:'维护',      t:'维护',     sel:'sel-red',   badge:'b-red',    btxt:'维护'},
  {v:'额满，充值关',  t:'额满，充值关',   sel:'sel-red',    badge:'b-red',    btxt:'额满，充值关'},
  {v:'额满，充值没关',t:'额满，充值没关', sel:'sel-amber',  badge:'b-amber',  btxt:'额满，充值没关'},
  {v:'代付不顺',     t:'代付不顺',       sel:'sel-orange', badge:'b-orange', btxt:'代付不顺'},
  {v:'馀额过高',  t:'馀额过高', sel:'sel-blue',  badge:'b-blue',   btxt:'馀额过高'},
  {v:'等组长通知开启',t:'待通知',sel:'sel-purple',badge:'b-purple',btxt:'待通知'},
  {v:'停用',      t:'停用',     sel:'sel-gray',  badge:'b-gray',   btxt:'停用'},
  {v:'X',         t:'X / 不开启',sel:'sel-gray', badge:'b-gray',   btxt:'X'}
];
function stMeta(v){
  v=(v||'').trim();
  let m=STATES.find(s=>s.v===v);
  if(m) return m;
  if(v.indexOf('通知')>=0||v.indexOf('待')>=0) return STATES[5];
  return {v:v,t:v,sel:'sel-gray',badge:'b-gray',btxt:v};
}
function isOn(v){ return (v||'').trim()==='✅'; }
function recvOn(v){ return (v||'').indexOf('⭕')>=0; }

/* ── 本机储存 + 云端同步 ── */
const KEY='du_channel_overrides_v2';
let overrides={}, tsMap={}, editMode=false;
try{ overrides=JSON.parse(localStorage.getItem(KEY))||{}; }catch(e){ overrides={}; }
try{ tsMap=JSON.parse(localStorage.getItem(KEY+'_ts'))||{}; }catch(e){ tsMap={}; }
try{ editMode=localStorage.getItem(KEY+'_edit')==='1'; }catch(e){}

/* 载入本机已新增的自订商户 */
let customList=[];
try{ customList=JSON.parse(localStorage.getItem(KEY+'_custom'))||[]; }catch(e){ customList=[]; }
function loadCustom(){ customList.forEach(c=>{ if(c&&c.商户&&!KMAP[c.key]){
  const rec={id:DATA.length,key:c.key,商户:c.商户,section:c.section||'使用中',内部:'',外部:'',收款:c.收款||'⭕️',出款:'✅',下发:'✅',放置金:c.放置金||'',下发时间:c.下发时间||'',备注:'',color:'',custom:true};
  DATA.push(rec); KMAP[c.key]=rec;
}}); }
function saveCustom(){ try{ localStorage.setItem(KEY+'_custom', JSON.stringify(DATA.filter(d=>d.custom).map(d=>({商户:d.商户,key:d.key,section:d.section,收款:d.收款,放置金:d.放置金,下发时间:d.下发时间})))); }catch(e){} }
function buildKey(name){ let k=name,n=1; while(KMAP[k]){ n++; k=name+'#'+n; } return k; }
function addMerchant(info){
  if(!info.商户) return;
  const key=buildKey(info.商户);
  const rec={id:DATA.length,key:key,商户:info.商户,section:info.section||'使用中',内部:'',外部:'',收款:info.收款||'⭕️',出款:'✅',下发:'✅',放置金:info.放置金||'',下发时间:info.下发时间||'',备注:'',color:'',custom:true};
  DATA.push(rec); KMAP[key]=rec;
  const ts=Date.now();
  const payload=JSON.stringify({商户:rec.商户,section:rec.section,收款:rec.收款,放置金:rec.放置金,下发时间:rec.下发时间});
  overrides[key]=overrides[key]||{}; overrides[key].__new=payload;
  tsMap[key+'|__new']=ts; queuePush(key,'__new',payload,ts);
  [['内部',info.内部],['外部',info.外部],['备注',info.备注]].forEach(([f,v])=>{
    if(v){ applyCell(key,f,v,ts); queuePush(key,f,v,ts); }
  });
  saveCustom(); persist(); render(); stats(); toast('已新增：'+rec.商户);
}
function removeFromData(key){ const i=DATA.findIndex(d=>d.key===key); if(i>=0) DATA.splice(i,1); delete KMAP[key]; delete overrides[key]; }
function deleteMerchant(key){
  const rec=KMAP[key]; if(!rec||!rec.custom) return;
  removeFromData(key);
  const ts=Date.now(); overrides[key]={__new:''}; tsMap[key+'|__new']=ts; queuePush(key,'__new','',ts);
  saveCustom(); persist(); render(); stats(); toast('已删除：'+rec.商户);
}
function handleNewCell(c){
  if(c.v && c.v!==''){
    if(!KMAP[c.i]){ try{ const info=JSON.parse(c.v);
      const rec={id:DATA.length,key:c.i,商户:info.商户||c.i,section:info.section||'使用中',内部:'',外部:'',收款:info.收款||'⭕️',出款:'✅',下发:'✅',放置金:info.放置金||'',下发时间:info.下发时间||'',备注:'',color:'',custom:true};
      DATA.push(rec); KMAP[c.i]=rec; saveCustom(); }catch(_){}}
  } else if(KMAP[c.i]&&KMAP[c.i].custom){ removeFromData(c.i); saveCustom(); }
}
function persist(){ try{ localStorage.setItem(KEY,JSON.stringify(overrides)); localStorage.setItem(KEY+'_ts',JSON.stringify(tsMap)); }catch(e){} }
function persistEdit(){ try{ localStorage.setItem(KEY+'_edit',editMode?'1':'0'); }catch(e){} }
function fmtDate(ts){const d=new Date(ts),p=n=>String(n).padStart(2,'0');return d.getFullYear()+'/'+p(d.getMonth()+1)+'/'+p(d.getDate());}
function today(){return fmtDate(Date.now());}

function eff(d){
  const o=overrides[d.key]||{};
  return {
    内部:'内部' in o?o.内部:d.内部, 外部:'外部' in o?o.外部:d.外部,
    收款:'收款' in o?o.收款:d.收款, 出款:'出款' in o?o.出款:d.出款,
    下发:'下发' in o?o.下发:d.下发, 备注:'备注' in o?o.备注:d.备注, 备注2:'备注2' in o?o.备注2:'', changed:o.changed||''
  };
}
/* 套用单一栏位（本机编辑或云端拉回共用）*/
function applyCell(key,field,val,ts){
  overrides[key]=overrides[key]||{};
  overrides[key][field]=val;
  if(field[0]!=='_') overrides[key].changed=fmtDate(ts);
  tsMap[key+'|'+field]=ts;
}
function setOverride(key,field,val){
  const ts=Date.now();
  applyCell(key,field,val,ts);
  persist();
  queuePush(key,field,val,ts);
}

/* ── Google Apps Script + Google Sheet 后端 ── */
let pushQ={}, pushT=null;
function setSync(s){
  const el=document.getElementById('syncStat'); if(!el)return;
  el.className='sync '+s;
  document.getElementById('syncTxt').textContent=
    ({off:'仅本机',idle:'云端已连接',busy:'同步中…',err:'同步失败·点此重试'})[s]||'';
}
function queuePush(key,field,val,ts){
  if(!SYNC_URL) return;
  pushQ[key+'|'+field]={i:key,f:field,v:val,t:ts};
  clearTimeout(pushT); pushT=setTimeout(flushPush,800);
}
function flushPush(){
  if(!SYNC_URL) return;
  const cells=Object.values(pushQ); if(!cells.length) return;
  pushQ={}; setSync('busy');
  fetch(SYNC_URL,{method:'POST',body:JSON.stringify({action:'push',cells:cells})})
    .then(r=>r.json()).then(()=>setSync('idle'))
    .catch(()=>{ cells.forEach(c=>pushQ[c.i+'|'+c.f]=c); setSync('err'); });
}
function cloudPull(){
  if(!SYNC_URL){ setSync('off'); return; }
  setSync('busy');
  fetch(SYNC_URL+(SYNC_URL.indexOf('?')<0?'?':'&')+'action=pull&_t='+Date.now())
    .then(r=>r.json()).then(res=>{
      const cells=(res&&res.cells)||[]; let changed=false;
      cells.forEach(c=>{ if(c.f==='__new' && (c.t||0)>(tsMap[c.i+'|__new']||0)){ handleNewCell(c); changed=true; } });
      cells.forEach(c=>{ const key=c.i+'|'+c.f;
        if((c.t||0)>(tsMap[key]||0)){ applyCell(c.i,c.f,c.v,c.t); changed=true; } });
      /* 把本机较新的（离线时改的）推回云端 */
      const up=[];
      Object.keys(tsMap).forEach(key=>{
        const cloud=cells.find(c=>(c.i+'|'+c.f)===key);
        if(!cloud || tsMap[key]>(cloud.t||0)){ const i=key.indexOf('|'); const k=key.slice(0,i), f=key.slice(i+1); if(overrides[k]&&f in overrides[k]) up.push({i:k,f:f,v:overrides[k][f],t:tsMap[key]}); }
      });
      if(up.length){ up.forEach(c=>pushQ[c.i+'|'+c.f]=c); flushPush(); }
      persist(); setSync('idle');
      if(changed){ render(); stats(); }
    })
    .catch(()=>setSync('err'));
}

const SOLO={'TKpay支付宝':'内','XPAY支付宝':'内','KW支付宝':'内','KW支付宝-TOMMY':'内','宝诺支付宝UID『8084』':'内'};
const state={sec:'all',recv:null,出款:null,下发:null,q:'',view:'内部'};
function pass(d){
  const solo=SOLO[d.商户];
  if(solo==='内' && state.view!=='内部') return false;
  if(solo==='外' && state.view!=='外部') return false;
  const e=eff(d);
  if(state.sec!=='all' && d.section!==state.sec) return false;
  if(state.recv==='on' && !recvOn(e.收款)) return false;
  if(state.recv==='off' && recvOn(e.收款)) return false;
  if(state.出款==='on' && !isOn(e.出款)) return false;
  if(state.下发==='on' && !isOn(e.下发)) return false;
  if(state.q){ if((d.商户+' '+(e.备注||'')).toLowerCase().indexOf(state.q.toLowerCase())<0) return false; }
  return true;
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
/* 商户名称配色：避开红色，用一组柔和好读的颜色，依群组底色分配（同群组同色）*/

function isGrayish(hex){const m=(hex||'').replace('#','');if(m.length<6)return true;const r=parseInt(m.slice(0,2),16),g=parseInt(m.slice(2,4),16),b=parseInt(m.slice(4,6),16);return (Math.max(r,g,b)-Math.min(r,g,b))<18;}
let colorByGroup={};

const SHARED_IO=['TKpay支付宝','XPAY支付宝','KW支付宝','KW支付宝-TOMMY','宝诺支付宝UID『8084』'];
function isShared(d){ return SHARED_IO.indexOf(d.商户)>=0; }
function cardHTML(d){
  const e=eff(d);
  const recv=recvOn(e.收款);
  const shared=isShared(d);
  const vlabel=shared?'内/外':state.view;
  const vfield=shared?'内部':state.view;
  const vval=(vfield==='内部'?e.内部:e.外部), vm=stMeta(vval);
  const clCls=shared?'cl-both':(state.view==='内部'?'cl-in':'cl-out');
  const dim=d.section==='不使用'?' dim':'';
  let body;
  if(editMode){
    body=`<div class="ctrl">
      <div class="ie">
        <div class="col"><span class="cl ${clCls}">${vlabel}</span>
          <select class="sel ${vm.sel}" data-key="${esc(d.key)}" data-field="${vfield}">${optsHTML(vval)}</select></div>
      </div>
      <div class="sw-row">
        ${swHTML('收款',recv,d.key,'收款',true)}
        ${swHTML('出款',isOn(e.出款),d.key,'出款')}
        ${swHTML('下发',isOn(e.下发),d.key,'下发')}
      </div>
    </div>`;
  } else {
    body=`<div class="ie">
      <div class="col"><span class="cl ${clCls}">${vlabel}</span><span class="badge ${vm.badge} big">${vm.btxt}</span></div>
    </div>`;
  }
  let meta='';
  if(d.放置金) meta+=`<div class="m"><span class="k">放置金</span><span class="v">${esc(d.放置金)}</span></div>`;
  if(d.下发时间) meta+=`<div class="m"><span class="k">下发时间</span><span class="v">${esc(d.下发时间)}</span></div>`;
  const metaView=`<div class="m"><span class="k">出款</span><span class="v ${isOn(e.出款)?'on':'off'}">${isOn(e.出款)?'✅':'✕'}</span></div><div class="m"><span class="k">下发</span><span class="v ${isOn(e.下发)?'on':'off'}">${isOn(e.下发)?'✅':'✕'}</span></div>`+meta;
  const n1=e.备注||'', n2=e.备注2||'';
  let note='', noteFold='';
  if(editMode){
    note=`<div class="note-wrap"><span class="ncl">原始备注</span>`
      +`<textarea class="note-edit" data-key="${esc(d.key)}" data-field="备注" rows="2" placeholder="点此输入 / 修改原始备注…">${esc(n1)}</textarea>`
      +((d.备注 && d.备注!==n1)?`<div class="srctip">原文：${esc(d.备注)}</div>`:'')
      +`</div>`
      +`<div class="note-wrap"><span class="ncl">补充备注</span>`
      +`<textarea class="note-edit" data-key="${esc(d.key)}" data-field="备注2" rows="2" placeholder="点此输入补充备注…">${esc(n2)}</textarea></div>`;
  } else {
    noteFold=((n1||n2)?`<details class="note-fold"><summary class="note-sum"></summary><div class="note-pop">`
       +(n1?`<div class="note"><span class="nk">原始备注</span>${esc(n1)}</div>`:'')
       +(n2?`<div class="note n2"><span class="nk">补充备注</span>${esc(n2)}</div>`:'')
       +`</div></details>`:'');
  }
  const chg=e.changed?`<div class="chg">✎ 最后变更：${e.changed}</div>`:'';
  const del=(editMode&&d.custom)?`<button class="del-merchant" data-del="${esc(d.key)}">🗑 删除此商户</button>`:'';
  const metaFold=(!editMode)?`<details class="meta-fold"><summary class="meta-sum" title="出款 / 下发 / 放置金 / 下发时间">⋯</summary><div class="meta-pop"><div class="meta">${metaView}</div></div></details>`:'';
  return `<div class="card${dim}${editMode?' draggable':''}" data-key="${esc(d.key)}">
    <span class="accent" style="background:${d.color||'#ccc'}"></span>
    <div class="c-head">
      ${editMode?'<span class="drag-handle" title="拖曳排序">⠿</span>':''}
      <span class="c-name" style="color:${nameColor(d)};background:${nameColor(d)}1a"><span class="c-name-txt" data-copy="${esc(d.商户)}" title="${esc(d.商户)}">${esc(d.商户)}</span>${noteFold}</span>
    </div>
    <div class="c-row2">${body}<div class="c-r2-right">${SOLO[d.商户]?`<span class="solo-tag solo-${SOLO[d.商户]==='内'?'in':'out'}">${SOLO[d.商户]}</span>`:''}${metaFold}<span class="c-recv">${recv?'<span class="recv-on">⭕️</span>':'<span class="recv-off">❌</span>'}</span></div></div>
    ${(editMode&&meta)?`<div class="meta">${meta}</div>`:''}${note}${chg}${del}</div>`;
}

function viewVal(d){ return state.view==='内部'?eff(d).内部:eff(d).外部; }
function ordVal(d){ const o=overrides[d.key]; return (o&&o.__order!=null&&o.__order!=='')?Number(o.__order):null; }
function ordSort(a,b){ const oa=ordVal(a),ob=ordVal(b); if(oa!=null&&ob!=null)return oa-ob; if(oa!=null)return -1; if(ob!=null)return 1; return a.id-b.id; }
function render(){
  const sb=document.getElementById('searchBox'), home=document.getElementById('searchHome'), listEl=document.getElementById('list');
  if(sb&&home&&listEl.contains(sb)) home.appendChild(sb);
  const rows=DATA.filter(pass);
  let html='';
  [['使用中','use','✓'],['不使用','unused','']].forEach(([name,key,icon])=>{
    const items=rows.filter(d=>d.section===name && !(state.view==='外部'&&isShared(d))).sort(ordSort);
    if(!items.length) return;
    const closed=v=>v==='X'||v==='停用';
    const norm=items.filter(d=>!closed(viewVal(d)));
    const xs=items.filter(d=>closed(viewVal(d)));
    let inner=norm.length?`<div class="grid">${norm.map(cardHTML).join('')}</div>`:'';
    if(xs.length){
      inner+=`<div class="subsep">${state.view} · 未开放 / 停用 · ${xs.length} 条</div><div class="grid">${xs.map(cardHTML).join('')}</div>`;
    }
    html+=`<div class="section sec-${key}"><div class="sec-head"><div class="section-title t-${key}">${icon?`<span class="tick">${icon}</span>`:''}${name}<span class="cnt">${items.length} 条</span></div>${key==='use'?'<span class="tsearch-slot"></span>':''}</div>${inner}</div>`;
  });
  document.getElementById('list').innerHTML=html;
  const slot=listEl.querySelector('.tsearch-slot');
  if(slot&&sb) slot.appendChild(sb); else if(sb&&home&&sb.parentElement!==home) home.appendChild(sb);
  document.getElementById('empty').style.display=rows.length?'none':'block';
}

/* ── 拖曳排序（编辑模式，从把手 ⠿ 拖动；支援触控与滑鼠）── */
function getDragAfter(grid,x,y){
  const els=[...grid.querySelectorAll('.card:not(.dragging)')];
  let best=null,bestD=Infinity,before=true;
  els.forEach(el=>{
    const r=el.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2, d=Math.hypot(cx-x,cy-y);
    if(d<bestD){ bestD=d; best=el; before=(y<cy-2)||(Math.abs(y-cy)<=r.height/2 && x<cx); }
  });
  if(!best) return null;
  return before?best:best.nextElementSibling;
}
function commitOrder(){
  document.querySelectorAll('#list .grid').forEach(grid=>{
    [...grid.querySelectorAll('.card')].forEach((el,i)=>{
      const k=el.dataset.key; if(!k)return;
      const cur=overrides[k]&&overrides[k].__order;
      if(Number(cur)!==i){
        overrides[k]=overrides[k]||{}; overrides[k].__order=i;
        const ts=Date.now(); tsMap[k+'|__order']=ts; queuePush(k,'__order',i,ts);
      }
    });
  });
  persist(); render(); stats();
}
let dEl=null,dGrid=null,dKey=null;
function dMove(e){
  if(!dEl)return;
  const p=e.touches?e.touches[0]:e;
  const after=getDragAfter(dGrid,p.clientX,p.clientY);
  if(after) dGrid.insertBefore(dEl,after); else dGrid.appendChild(dEl);
  if(e.cancelable) e.preventDefault();
}
function dUp(){
  if(!dEl)return;
  dEl.classList.remove('dragging');
  document.removeEventListener('pointermove',dMove);
  document.removeEventListener('pointerup',dUp);
  document.removeEventListener('touchmove',dMove);
  document.removeEventListener('touchend',dUp);
  dEl=null; dGrid=null;
  if(dKey){ dKey=null; commitOrder(); }
}
function dStart(e){
  if(!editMode)return;
  const h=e.target.closest('.drag-handle'); if(!h)return;
  const card=h.closest('.card'); if(!card)return;
  if(e.cancelable) e.preventDefault();
  dEl=card; dGrid=card.parentElement; dKey=card.dataset.key;
  card.classList.add('dragging');
  if(window.PointerEvent){
    document.addEventListener('pointermove',dMove,{passive:false});
    document.addEventListener('pointerup',dUp);
  } else {
    document.addEventListener('touchmove',dMove,{passive:false});
    document.addEventListener('touchend',dUp);
  }
}

/* ── AES 解密 + 密码锁 ── */
function b64ToBytes(b){const s=atob(b),a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
async function deriveKey(pass){
  const baseKey=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:b64ToBytes(ENC.salt),iterations:ENC.iter,hash:'SHA-256'},baseKey,{name:'AES-GCM',length:256},false,['decrypt']);
}
async function tryDecrypt(pass){
  try{
    const key=await deriveKey(pass);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64ToBytes(ENC.iv)},key,b64ToBytes(ENC.ct));
    const obj=JSON.parse(new TextDecoder().decode(pt));
    DATA=obj.data||[]; SYNC_URL=obj.url||'';
    return true;
  }catch(e){ return false; }
}
(function(){
  const lock=document.getElementById('lockBg'), pw=document.getElementById('lockPw'), btn=document.getElementById('lockBtn'), err=document.getElementById('lockErr');
  let booted=false;
  async function unlock(pass,fromCache){
    if(booted) return;
    const ok=await tryDecrypt(pass);
    if(ok){ booted=true; try{localStorage.setItem('du_pw',pass);}catch(e){} lock.classList.add('hidden'); start(); }
    else { try{localStorage.removeItem('du_pw');}catch(e){} if(!fromCache){ err.textContent='密码错误'; pw.value=''; pw.focus(); } }
  }
  let cached=''; try{ cached=localStorage.getItem('du_pw')||''; }catch(e){}
  if(cached){ unlock(cached,true); }
  btn.addEventListener('click',()=>unlock(pw.value,false));
  pw.addEventListener('keydown',e=>{ if(e.key==='Enter') unlock(pw.value,false); });
  setTimeout(()=>pw.focus(),120);
})();
