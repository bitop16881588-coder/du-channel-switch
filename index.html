<style>
  :root{
    --nav:#15233b; --nav2:#1d3050; --gold:#c79a3a; --gold-soft:#e8d199;
    --ink:#1c2128; --ink2:#3a424d; --muted:#6b7682; --line:#e3e7ec;
    --bg:#eef1f5; --card:#ffffff;
    --g:#1f9d57; --g-bg:#e7f6ec; --amber:#c9871a; --amber-bg:#fdf3e0;
    --red:#cf3b3b; --red-bg:#fbe9e9; --blue:#2f6f8f; --blue-bg:#e6f1f6;
    --purple:#7a51c4; --purple-bg:#efe9fb; --gray:#8a939e; --gray-bg:#eef1f4;

  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}

    background:var(--bg);color:var(--ink);line-height:1.5;padding-bottom:48px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:0 16px}

  header.top{background:linear-gradient(160deg,var(--nav) 0%,var(--nav2) 100%);
    border-radius:0 0 20px 20px;padding:24px 22px 20px;color:#fff;
    box-shadow:0 6px 22px rgba(21,35,59,.25);position:relative;overflow:hidden}
  header.top::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;
    background:radial-gradient(circle,rgba(199,154,58,.22),transparent 70%);pointer-events:none}
  .title{font-size:22px;font-weight:800;letter-spacing:1px;display:flex;align-items:center;gap:11px;color:#fff}
  .title .tag{font-size:11px;font-weight:800;color:var(--nav);background:var(--gold);padding:3px 9px;border-radius:6px;letter-spacing:1.5px}
  .sub{color:#aebbd0;font-size:12.5px;margin-top:6px;display:flex;gap:14px;flex-wrap:wrap}
  .sub b{color:var(--gold-soft);font-weight:700}
  .stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
  .stat{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:9px 14px;flex:1;min-width:120px}
  .stat .n{font-size:23px;font-weight:800;line-height:1;color:#fff}
  .stat .l">区域</div></div>
  .stat .n{font-size:23px;font-weight:800;line-height:1;color:#fff}
  .stat .l{font-size:11.5px;color:#9fb0c8;margin-top:4px}
  .stat.on .n{color:#5fe39b} .stat.off .n{color:#ff8a8a}

  .bar{position:sticky;top:0;z-index:20;background:rgba(238,241,245,.93);backdrop-filter:blur(8px);
    padding:12px 0 10px;margin-bottom:4px;border-bottom:1px solid var(--line)}
  .search{position:relative}

  .search .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 8px;display:none}

  .toolrow{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-top:9px}
  .filters{display:flex;gap:7px;flex-wrap:wrap}

  .chip:hover{border-color:var(--gold)}
  .chip.active{background:var(--nav);color:#fff;border-color:var(--nav)}
  .chip.active.g{background:var(--g);border-color:var(--g)}
  .chip.active.r{background:var(--red);border-color:var(--red)}
  .actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap}

  .sw .knob{position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:.18s}
  .sw.on .track{background:var(--g)}
  .sw.on .knob{transform:translateX(17px)}
  .sw.sw-recv:not(.on) .track{background:var(--red)}
  .toolrow .sw{background:#fff;border:1.5px solid var(--line);border-radius:9px;padding:5px 11px}

  details.legend{background:var(--card);border:1px solid var(--line);border-radius:12px;margin:12px 0 4px;box-shadow:var(--shadow)}
  details.legend summary{cursor:pointer;padding:11px 15px;font-weight:700;font-size:13.5px;list-style:none;display:flex;align-items:center;gap:8px}

  details.legend summary::before{content:"▸";color:var(--gold);transition:.15s}
  details.legend[open] summary::before{transform:rotate(90deg)}
  .legend-grid{display:flex;flex-wrap:wrap;gap:8px;padding:4px 15px 15px}
  .legend-grid .li{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink2)}

  .badge{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;padding:2px 8px;border-radius:7px;white-space:nowrap;line-height:1.6}
  .b-ok{background:var(--g-bg);color:var(--g)} .b-amber{background:var(--amber-bg);color:var(--amber)}
  .b-red{background:var(--red-bg);color:var(--red)} .b-blue{background:var(--blue-bg);color:var(--blue)}
  .b-purple{background:var(--purple-bg);color:var(--purple)} .b-gray{background:var(--gray-bg);color:var(--gray)}

  .section-title{font-size:14px;font-weight:800;margin:22px 4px 10px;display:flex;align-items:center;gap:9px;color:var(--ink)}
  .section-title .dot{width:9px;height:9px;border-radius:50%}
  .section-title .cnt{font-size:12px;font-weight:600;color:var(--muted)}
  .section-title.unused{color:var(--muted)}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px}
  .card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 15px 13px 18px;box-shadow:var(--shadow);overflow:hidden;transition:.12s}
  .card:hover{box-shadow:0 4px 14px rgba(20,30,40,.10)}
  .card .accent{position:absolute;left:0;top:0;bottom:0;width:5px}
  .card.dim{opacity:.66}
  .card.dim .accent{filter:saturate(.25)}
  .c-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
  .c-name{font-size:15.5px;font-weight:800;letter-spacing:.2px;cursor:pointer}
  .c-name:hover{color:var(--gold)}
  .recv-on{color:var(--g);font-weight:800;font-size:13px;white-space:nowrap}
  .recv-off{color:var(--red);font-weight:800;font-size:13px;white-space:nowrap}

  .rowio{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .io{display:flex;align-items:center;gap:5px;background:#f7f9fb;border:1px solid var(--line);border-radius:8px;padding:3px 9px;font-size:12px;font-weight:600}
  .io .k{color:var(--muted)} .io .v.on{color:var(--g)} .io .v.off{color:var(--gray)}

  .ctrl{margin-top:11px;border-top:1px dashed var(--line);padding-top:11px;display:flex;flex-direction:column;gap:8px}
  .ie{display:flex;gap:8px}
  .ie .col{flex:1;background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:7px 9px}
  .ie .cl{font-size:11px;color:var(--muted);font-weight:700;display:block;margin-bottom:4px;letter-spacing:.5px}
  .sel{width:100%;appearance:none;-webkit-appearance:none;border:1.5px solid var(--line);border-radius:8px;

  .sel.sel-amber{color:var(--amber);border-color:#f0dcb4;background-color:var(--amber-bg)}
  .sel.sel-red{color:var(--red);border-color:#f0c4c4;background-color:var(--red-bg)}
  .sel.sel-blue{color:var(--blue);border-color:#bcd9e6;background-color:var(--blue-bg)}
  .sel.sel-purple{color:var(--purple);border-color:#d6c5f0;background-color:var(--purple-bg)}
  .sel.sel-gray{color:var(--gray);border-color:#d4dae0;background-color:var(--gray-bg)}

  .meta .m .k{color:var(--muted);font-size:11px;display:block} .meta .m .v{font-weight:700}
  .note{margin-top:10px;background:#fafbfc;border:1px dashed var(--line);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--ink2);line-height:1.45}
  .note .nk{color:var(--gold);font-weight:800;margin-right:5px}
  .chg{margin-top:8px;font-size:11px;color:var(--gold);font-weight:700;display:flex;align-items:center;gap:5px}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--nav);color:#fff;padding:9px 18px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:60}

  .cloud-syncing{font-size:11px;background:#2f6f8f;color:#fff;padding:2px 6px;border-radius:4px;margin-left:8px;font-weight:normal;display:none}

</style>

  </details>

const STATES=[
  {v:'',          t:'正常',     sel:'sel-ok',    badge:'b-ok',     btxt:'正常'},
  {v:'日切',      t:'日切',     sel:'sel-amber', badge:'b-amber',  btxt:'日切'},
  {v:'维护',      t:'维护',     sel:'sel-red',    badge:'b-red',    btxt:'维护'},
  {v:'限额满',    t:'限额满',    sel:'sel-red',    badge:'b-red',    btxt:'限额满'},
  {v:'馀额过高',  t:'馀额过高', sel:'sel-blue',  badge:'b-blue',    btxt:'馀额过高'},
  {v:'等组长通知开启',t:'待通知',sel:'sel-purple',badge:'b-purple',btxt:'待通知'},
  {v:'停用',      t:'停用',     sel:'sel-gray',  badge:'b-gray',    btxt:'停用'},
  {v:'X',          t:'X / 不开启',sel:'sel-gray', badge:'b-gray',    btxt:'X'}
];
function stMeta(v){
  v=(v||'').trim();
  let m=STATES.find(s=>s.v===v);
  if(m) return m;
  if(v.indexOf('通知')>=0||v.indexOf('待')>=0) return STATES[5];
  return {v:v,t:v,sel:'sel-gray',badge:'b-gray',btxt:v};
}
function isOn(v){ return (v||'').trim()==='✅'; }
function recvOn(v){ return (v||'').indexOf('⭕')>=0; }

/* ── 核心逻辑：云端即时同步 ── */
let overrides={}, editMode=false;
try{ editMode=localStorage.getItem('du_channel_overrides_v1_edit')==='1'; }catch(e){}

function today(){const d=new Date(),p=n=>String(n).padStart(2,'0');return d.getFullYear()+'/'+p(d.getMonth()+1)+'/'+p(d.getDate());}

// 1. 从云数据库获取最新数据
async function pullFromCloud() {
  const label = document.getElementById('syncLabel');
  try {
    const res = await fetch(CLOUD_URL);
    if(res.ok) {
      const cloudData = await res.json();
      if (cloudData && typeof cloudData === 'object') {
        // 比对是否有改变，避免频繁重绘
        if (JSON.stringify(overrides) !== JSON.stringify(cloudData)) {
          overrides = cloudData;
          render();
          stats();
        }
      }
    }
  } catch (e) {
    console.error("云端同步失败: ", e);
  }
}

// 2. 将本地修改上传到云数据库
async function pushToCloud() {
  const label = document.getElementById('syncLabel');
  if(label) label.style.display = 'inline-block';
  try {
    await fetch(CLOUD_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(overrides)
    });
  } catch (e) {
    console.error("云端推送失败: ", e);
  } finally {
    if(label) setTimeout(() => label.style.display = 'none', 500);
  }
}

function eff(d){
  const o=overrides[d.id]||{};
  return {
    内部:'内部' in o?o.内部:d.内部, 外部:'外部' in o?o.外部:d.外部,
    收款:'收款' in o?o.收款:d.收款, 出款:'出款' in o?o.出款:d.出款,
    下发:'下发' in o?o.下发:d.下发, changed:o.changed||''
  };
}

function setOverride(id,field,val){
  overrides[id]=overrides[id]||{};
  overrides[id][field]=val;
  overrides[id].changed=today();
  pushToCloud(); // 改变状态立即推送
  render();
  stats();
}

const state={sec:'all',recv:null,出款:null,下发:null,q:''};
function pass(d){
  const e=eff(d);
  if(state.sec!=='all' && d.section!==state.sec) return false;
  if(state.recv==='on' && !recvOn(e.收款)) return false;
  if(state.recv==='off' && recvOn(e.收款)) return false;
  if(state.出款==='on' && !isOn(e.出款)) return false;
  if(state.下发==='on' && !isOn(e.下发)) return false;
  if(state.q){ if((d.商户+' '+d.备注).toLowerCase().indexOf(state.q.toLowerCase())<0) return false; }
  return true;
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function optsHTML(cur){
  return STATES.map(s=>`<option value="${esc(s.v)}"${s.v===(cur||'').trim()?' selected':''}>${s.t}</option>`).join('');
}
function swHTML(label,on,id,field,recv){
  return `<span class="sw ${recv?'sw-recv':''} ${on?'on':''}" data-id="${id}" data-field="${field}">
    <span class="track"><span class="knob"></span></span><span>${label}</span></span>`;
}

function cardHTML(d){
  const e=eff(d);
  const recv=recvOn(e.收款), inM=stMeta(e.内部), outM=stMeta(e.外部);
  const dim=d.section==='不使用'?' dim':'';
  let body;
  if(editMode){
    body=`<div class="ctrl">
      <div class="ie">
        <div class="col"><span class="cl">内部</span>
          <select class="sel ${inM.sel}" data-id="${d.id}" data-field="内部">${optsHTML(e.内部)}</select></div>
        <div class="col"><span class="cl">外部</span>
          <select class="sel ${outM.sel}" data-id="${d.id}" data-field="外部">${optsHTML(e.外部)}</select></div>
      </div>
      <div class="sw-row">
        ${swHTML('收款',recv,d.id,'收款',true)}
        ${swHTML('出款',isOn(e.出款),d.id,'出款')}
        ${swHTML('下发',isOn(e.下发),d.id,'下发')}
      </div>
    </div>`;
  } else {
    body=`<div class="rowio">
      <span class="io"><span class="k">内部</span><span class="badge ${inM.badge}">${inM.btxt}</span></span>
      <span class="io"><span class="k">外部</span><span class="badge ${outM.badge}">${outM.btxt}</span></span>
      <span class="io"><span class="k">出款</span><span class="v ${isOn(e.出款)?'on':'off'}">${isOn(e.出款)?'✅':'✕'}</span></span>
      <span class="io"><span class="k">下发</span><span class="v ${isOn(e.下发)?'on':'off'}">${isOn(e.下发)?'✅':'✕'}</span></span>
    </div>`;
  }
  let meta='';
  if(d.放置金) meta+=`<div class="m"><span class="k">放置金</span><span class="v">${esc(d.放置金)}</span></div>`;
  if(d.下发时间) meta+=`<div class="m"><span class="k">下发时间</span><span class="v">${esc(d.下发时间)}</span></div>`;
  const note=d.备注?`<div class="note"><span class="nk">备注</span>${esc(d.备注)}</div>`:'';
  const chg=e.changed?`<div class="chg">✎ 最后变更：${e.changed}</div>`:'';
  return `<div class="card${dim}">
    <span class="accent" style="background:${d.color||'#ccc'}"></span>
    <div class="c-head">
      <span class="c-name" data-copy="${esc(d.商户)}">${esc(d.商户)}</span>
      <span>${recv?'<span class="recv-on">⭕️ 收款</span>':'<span class="recv-off">❌ 停收</span>'}</span>
    </div>
    ${body}${meta?`<div class="meta">${meta}</div>`:''}${note}${chg}</div>`;
}

function render(){
  const rows=DATA.filter(pass);
  let html='';
  [['使用中','#1f9d57'],['不使用','#8a939e']].forEach(([name,dot])=>{
    const items=rows.filter(d=>d.section===name);
    if(!items.length) return;
    html+=`<div class="section-title ${name==='不使用'?'unused':''}"><span class="dot" style="background:${dot}"></span>${name}<span class="cnt">${items.length} 条</span></div><div class="grid">${items.map(cardHTML).join('')}</div>`;
  });
  document.getElementById('list').innerHTML=html;
  document.getElementById('empty').style.display=rows.length?'none':'block';
}
function stats(){
  const on=DATA.filter(d=>recvOn(eff(d).收款)).length;
  document.getElementById('s-use').textContent=DATA.filter(d=>d.section==='使用中').length;
  document.getElementById('s-unused').textContent=DATA.filter(d=>d.section==='不使用').length;
  document.getElementById('s-recv').textContent=on;
  document.getElementById('s-recvoff').textContent=DATA.length-on;
  document.getElementById('totalN').textContent=DATA.length;
}

/* filters */
document.getElementById('filters').addEventListener('click',e=>{
  const chip=e.target.closest('.chip'); if(!chip)return;
  const f=chip.dataset.f,v=chip.dataset.v,cls=chip.dataset.cls||'';
  if(f==='sec'){ state.sec=v; document.querySelectorAll('[data-f=sec]').forEach(c=>c.classList.remove('active')); chip.classList.add('active'); }
  else{ const cur=state[f]===v; state[f]=cur?null:v; chip.classList.toggle('active',!cur); cur?chip.classList.remove(cls):chip.classList.add(cls); }
  render();
});

/* search */
const q=document.getElementById('q'),clr=document.getElementById('clr');
q.addEventListener('input',()=>{state.q=q.value.trim();clr.style.display=q.value?'block':'none';render();});
clr.addEventListener('click',()=>{q.value='';state.q='';clr.style.display='none';render();q.focus();});

/* list interactions: select change / toggle / copy */
const list=document.getElementById('list');
list.addEventListener('change',e=>{
  const s=e.target.closest('select.sel'); if(!s)return;
  setOverride(+s.dataset.id,s.dataset.field,s.value);
});
list.addEventListener('click',e=>{
  const sw=e.target.closest('.sw');
  if(sw){ const id=+sw.dataset.id,f=sw.dataset.field,cur=eff(DATA[id])[f];
    let nv; if(f==='收款') nv=recvOn(cur)?'❌':'⭕️'; else nv=isOn(cur)?'X':'✅';
    setOverride(id,f,nv); return; }
  const n=e.target.closest('[data-copy]');
  if(n){ const t=n.dataset.copy; (navigator.clipboard?navigator.clipboard.writeText(t):Promise.reject()).then(()=>toast('已复制：'+t)).catch(()=>toast('已复制：'+t)); }
});

/* edit mode */
const editSw=document.getElementById('editSw');
function syncEdit(){ editSw.classList.toggle('on',editMode); }
editSw.addEventListener('click',()=>{ editMode=!editMode; try{localStorage.setItem('du_channel_overrides_v1_edit',editMode?'1':'0');}catch(e){} syncEdit(); render(); });

const toastEl=document.getElementById('toast');let tT;
function toast(m){toastEl.textContent=m;toastEl.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>toastEl.classList.remove('show'),1500);}

document.title=SITE_TITLE+' '+SITE_BADGE;
document.getElementById('siteTitle').textContent=SITE_TITLE;
document.getElementById('siteBadge').textContent=SITE_BADGE;
document.getElementById('lastUpdated').textContent=LAST_UPDATED;
syncEdit();

// 初始化数据拉取，并且设置每 3 秒自动抓取一次云端最新状态
pullFromCloud();
setInterval(pullFromCloud, 3000);
</script>
</body>
</html>
